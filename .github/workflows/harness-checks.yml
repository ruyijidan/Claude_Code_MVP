name: Harness Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Project
        run: python -m pip install -e .

      - name: Run Unit Tests
        run: python -m unittest discover -s tests

      - name: Architecture Boundaries
        run: python scripts/check_architecture.py

      - name: Verify Script Sanity
        run: |
          test -f scripts/agent_verify.sh
          bash -n scripts/agent_verify.sh

      - name: File Size Check
        run: |
          python - <<'PY'
          from pathlib import Path
          limit = 350
          violations = []
          for path in Path("app").rglob("*.py"):
              if "__pycache__" in path.parts:
                  continue
              lines = path.read_text(encoding="utf-8").splitlines()
              if len(lines) > limit:
                  violations.append(f"{path}: {len(lines)} lines")
          if violations:
              print("❌ Python files exceed size limit")
              print("✅ FIX: split large modules into smaller reusable units")
              print("\n".join(violations))
              raise SystemExit(1)
          print("✅ File size checks passed")
          PY
